[build]
  # Deploys the Convex schema/functions (using CONVEX_DEPLOY_KEY) before
  # building the frontend, so production Convex never drifts from this repo's
  # convex/ code. This value takes priority over any Build command set in the
  # Netlify UI — edit it here, not in the dashboard.
  command = "npx convex deploy --cmd 'npm run build'"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# API requests go to the Express app running as a Netlify Function.
# (Function handlers read the original request path from the Lambda event,
# not the redirect destination, so the "/api/*" prefix is preserved.)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# SPA fallback — everything else is client-side routed.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
